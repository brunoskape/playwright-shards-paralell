name: Playwright Tests - Parallel & Shards

# Executa nos pushes e PRs para a branch main
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------------ #
  # JOB: playwright-shards                                               #
  # Cada instância desta matrix representa um SHARD independente.        #
  # Os 3 shards rodam EM PARALELO em agentes distintos do GitHub Actions.#
  # ------------------------------------------------------------------ #
  playwright-shards:
    name: "Playwright - Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }}"
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false        # não cancela os outros shards se um falhar
      matrix:
        shardIndex: [1, 2, 3]
        shardTotal: [3]

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Instalar browsers do Playwright
        run: npx playwright install --with-deps chromium

      # ---------------------------------------------------------------- #
      # PONTO PRINCIPAL: --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}
      # Cada agente recebe uma fatia dos testes automaticamente.
      # Aqui usamos apenas o projeto Chromium para reduzir o tempo de CI.
      # ---------------------------------------------------------------- #
      - name: Executar testes (Shard ${{ matrix.shardIndex }}/${{ matrix.shardTotal }})
        run: npx playwright test --project=chromium --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      # Salva o relatório HTML de cada shard como artefato
      - name: Salvar relatório do shard ${{ matrix.shardIndex }}
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-shard-${{ matrix.shardIndex }}
          path: playwright-report/
          retention-days: 7

  # ------------------------------------------------------------------ #
  # JOB: merge-reports                                                    #
  # Opcional: combina todos os relatórios dos shards em um único HTML.   #
  # ------------------------------------------------------------------ #
  merge-reports:
    name: Merge Reports
    runs-on: ubuntu-latest
    needs: playwright-shards
    if: always()
    permissions:
      contents: read

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Baixar todos os relatórios dos shards
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-report-shard-*
          path: all-reports/
          merge-multiple: false

      - name: Publicar relatório combinado
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-combined
          path: all-reports/
          retention-days: 14
